version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: k2k_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kadal2kadaai
      POSTGRES_USER: k2k_user
      POSTGRES_PASSWORD: k2k_secret_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k2k_user -d kadal2kadaai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: k2k_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass k2k_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "k2k_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: k2k_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    logging:
      driver: none

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: k2k_network
